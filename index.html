<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.supabase.co https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co ws://127.0.0.1:* http://127.0.0.1:*; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;">
    <title>تسجيل الدخول | منصة المتابع الدراسي</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md mx-4 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">مرحباً بك في منصتنا</h1>
            <p class="text-sm text-slate-500">خاص بـ (الطالب / ولي الأمر) لمتابعة الواجبات والدرجات</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">كود الطالب / ولي الأمر</label>
                <input type="text" id="loginCode" required placeholder="مثال: STD-2026-01" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-left" dir="ltr">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">الرقم السري</label>
                <input type="password" id="password" required placeholder="••••••••" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-left" dir="ltr">
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition-colors shadow-lg shadow-indigo-100 cursor-pointer">
                تسجيل الدخول
            </button>

            <p id="errorMessage" class="text-sm text-red-500 text-center hidden"></p>
        </form>
    </div>

    <script src="./index.js"></script>
</body>
</html>
